<style>
  @import '/css/deprecated-login-credentials.css';

  html {
    height: 100%;
  }

  body {
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    height: 100%;
    margin: 0;
  }

  .__private__homey-login-credentials {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    height: 100%;
    box-sizing: border-box;
  }

  .__private__homey-login-credentials__form {
    display: flex;
    flex-direction: column;
    flex-grow: 1;
    min-height: 0;
    height: 100%;
    box-sizing: border-box;
  }

  .__private__homey-login-credentials__center {
    width: 100%;
    flex-shrink: 0;
    margin-top: 0 !important;
    margin-bottom: 0 !important;
  }

  .pair-view-flex-spacer {
    flex-grow: 1;
    flex-shrink: 0;
    min-height: var(--homey-su-2);
  }

  .__private__homey-login-credentials__footer {
    flex-shrink: 0;
  }

  #login-credentials-logo {
    display: block;
    width: 66%;
    max-width: 280px;
    max-height: 100px;
    height: auto;
    margin-left: auto;
    margin-right: auto;
    margin-bottom: var(--homey-su-4);
    object-fit: contain;
  }
</style>

<div class="__private__homey-login-credentials">
  <form
    id="connection-form"
    class="__private__homey-login-credentials__form homey-form"
    action="/"
    method="post"
  >
    <div class="__private__homey-login-credentials__center">
      <img
        id="login-credentials-logo"
        src="connection_input.assets/logo.png"
        alt=""
      />
      <h1
        id="login-credentials-title"
        class="homey-title homey-text-align-center"
        data-i18n="settings.drivers.tp-link-managed-switch.pair.connection_input.title"
      ></h1>

      <div class="homey-form-group-large">
        <label
          class="homey-form-label"
          for="address"
          data-i18n="settings.drivers.tp-link-managed-switch.pair.connection_input.addressLabel"
        ></label>
        <input
          class="homey-form-input-large"
          id="address"
          type="text"
          value=""
          data-i18n-placeholder="settings.drivers.tp-link-managed-switch.pair.connection_input.addressPlaceholder"
        />
      </div>

      <div class="homey-form-group-large">
        <label
          class="homey-form-label"
          for="username"
          data-i18n="settings.drivers.tp-link-managed-switch.pair.connection_input.usernameLabel"
        ></label>
        <input
          class="homey-form-input-large"
          id="username"
          type="text"
          value=""
          data-i18n-placeholder="settings.drivers.tp-link-managed-switch.pair.connection_input.usernamePlaceholder"
        />
      </div>

      <div class="homey-form-group-large">
        <label
          class="homey-form-label"
          for="password"
          data-i18n="settings.drivers.tp-link-managed-switch.pair.connection_input.passwordLabel"
        ></label>
        <input
          class="homey-form-input-large"
          id="password"
          type="password"
          value=""
          data-i18n-placeholder="settings.drivers.tp-link-managed-switch.pair.connection_input.passwordPlaceholder"
        />
      </div>
    </div>

    <div class="pair-view-flex-spacer" aria-hidden="true"></div>

    <div class="__private__homey-login-credentials__footer">
      <button
        tabindex="0"
        class="homey-button-primary-shadow-full __private__homey-login-credentials__button"
        id="next"
        data-i18n="settings.drivers.tp-link-managed-switch.pair.connection_input.connect"
        type="submit"
      ></button>
    </div>
  </form>
</div>

<script type="text/javascript">
  (function () {
    Homey.setTitle(null);

    document.getElementById('connection-form').addEventListener('submit', function (event) {
      event.preventDefault();

      var btn = document.getElementById('next');
      if (btn.classList.contains('is-loading')) return;
      btn.classList.add('is-loading');

      var address = document.getElementById('address').value;
      var username = document.getElementById('username').value;
      var password = document.getElementById('password').value;

      Homey.emit(
        'pair_try_connect',
        { address: address, username: username, password: password },
        function (err, result) {
          btn.classList.remove('is-loading');
          if (err) {
            Homey.alert(err.message || String(err));
            return;
          }
          if (result && result.success === false) {
            Homey.alert(result.message || '');
          }
        },
      );

      return false;
    });
  })();
</script>
